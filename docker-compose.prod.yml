# HORIZON production stack. Runs on the OVH VPS Essential.
#
# Differences from docker-compose.yml (dev):
#   - Postgres + Redis are NOT exposed on host ports (internal network only)
#   - API is NOT exposed on host (only reachable via the nginx proxy)
#   - Web is a multi-stage build that produces an nginx-served static bundle
#     plus an in-container reverse-proxy for /api/* to the api service
#   - certbot sidecar issues + renews Let's Encrypt certs (HTTP-01)
#   - Restart policies, resource limits, healthchecks on every service
#   - Logs rotated (json-file driver with size + count caps)
#
# Bring up:
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build

name: horizon

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    container_name: horizon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - horizon-postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    networks: [horizon-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, SETGID, SETUID, FOWNER]
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: horizon-redis
    restart: unless-stopped
    # --requirepass enforces auth. Password is injected from .env.production
    # (REDIS_PASSWORD). All connection strings in .env.production must include
    # the password: redis://:${REDIS_PASSWORD}@redis:6379/{db}
    command: ["redis-server", "--save", "60", "1", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - horizon-redis-data:/data
    networks: [horizon-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID]
    deploy:
      resources:
        limits:
          memory: 384M
    logging: *default-logging

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: horizon-api
    restart: unless-stopped
    env_file: .env.production
    environment:
      WORKERS: "4"
      THREADS: "2"
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    networks: [horizon-net]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=5).status==200 else 1)"]
      interval: 15s
      timeout: 15s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    deploy:
      resources:
        limits:
          memory: 2G
    logging: *default-logging

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: horizon-worker
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres: {condition: service_healthy}
      redis:    {condition: service_healthy}
    networks: [horizon-net]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 768M
    logging: *default-logging

  # AIS daemon (aisstream.io) — restored 12 May 2026. Kpler subscription
  # remains pending, so this is the active source until that's enabled.
  # Free non-commercial tier; ~5-15s websocket latency; community
  # receiver coverage (better in coastal Europe / less in mid-ocean).
  ais:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: horizon-ais
    restart: unless-stopped
    env_file: .env.production
    command:
      ["python", "-m", "horizon_worker.services.ais_stream"]
    depends_on:
      postgres: {condition: service_healthy}
    networks: [horizon-net]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 128M
    logging: *default-logging

  web:
    # Multi-stage build: node 22 produces /dist, then nginx serves it and
    # proxies /api/* to the api service. See web/Dockerfile.prod.
    build:
      context: ./web
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: ""
    container_name: horizon-web
    restart: unless-stopped
    depends_on:
      - api
    networks: [horizon-net]
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      # nginx config bind-mounted from the project tree so we can edit + reload
      # without rebuilding the web image
      - ./nginx/hantavirus.software.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certificates live here (managed by certbot below)
      - letsencrypt:/etc/letsencrypt:ro
      # ACME HTTP-01 challenge directory
      - certbot-webroot:/var/www/certbot:ro
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, NET_BIND_SERVICE, SETGID, SETUID]
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging

  certbot:
    # Renews certificates every 12 hours; nginx mounts the cert dir read-only
    # so renewals are picked up after `docker compose exec web nginx -s reload`
    image: certbot/certbot:latest
    container_name: horizon-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM; while true; do
        certbot renew --webroot --webroot-path /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    networks: [horizon-net]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, DAC_OVERRIDE, FOWNER, SETGID, SETUID]
    logging: *default-logging

networks:
  horizon-net:
    driver: bridge

volumes:
  horizon-postgres-data:
  horizon-redis-data:
  letsencrypt:
  certbot-webroot:
