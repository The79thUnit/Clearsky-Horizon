          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is hantavirus?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Hantavirus is a family of viruses (genus Orthohantavirus, family Hantaviridae) carried by rodents that can cause severe disease in humans. The two main clinical syndromes are hantavirus pulmonary syndrome (HPS, common in the Americas, caused by Sin Nombre virus and Andes virus) and haemorrhagic fever with renal syndrome (HFRS, common in Eurasia, caused by Hantaan, Seoul, Puumala and Dobrava-Belgrade viruses)."
              }
            },
            {
              "@type": "Question",
              "name": "How is hantavirus transmitted?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Most hantaviruses are transmitted from rodents to humans via inhalation of aerosolised excreta (urine, faeces, saliva) or by direct contact with infected rodents. Andes virus is the only orthohantavirus with documented person-to-person transmission, primarily through close household contact. The virus is not airborne in the conventional sense and is not transmitted by mosquitoes or ticks."
              }
            },
            {
              "@type": "Question",
              "name": "What are the symptoms of hantavirus disease?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Initial symptoms appear 1 to 8 weeks after exposure and include fever, severe muscle aches, fatigue, headache, and gastrointestinal symptoms. In hantavirus pulmonary syndrome (HPS), this progresses to coughing, shortness of breath, and pulmonary oedema with case fatality around 38 percent. In haemorrhagic fever with renal syndrome (HFRS), patients develop kidney failure, low platelet count, and bleeding, with case fatality of 1 to 15 percent depending on serotype."
              }
            },
            {
              "@type": "Question",
              "name": "Is there a vaccine or treatment for hantavirus?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No licensed vaccine or antiviral is approved in Europe or North America. South Korea licenses Hantavax for Hantaan virus. Treatment is supportive: fluid management, mechanical ventilation, and renal replacement therapy. Ribavirin shows benefit in early HFRS but not HPS. Early recognition and intensive care are the strongest predictors of survival."
              }
            },
            {
              "@type": "Question",
              "name": "Which countries report hantavirus cases?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Cases are reported across the Americas (Argentina, Chile, Brazil, USA, Canada, Panama), Europe (Germany, Finland, Russia, Belgium, France), east Asia (China, South Korea, Japan), and increasingly in parts of Africa and southeast Asia. The US Four Corners region (Arizona, Colorado, New Mexico, Utah) is the historical heartland of Sin Nombre virus."
              }
            },
            {
              "@type": "Question",
              "name": "What is the MV Hondius hantavirus cluster?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "An Andes virus cluster aboard the MV Hondius cruise ship operating in Antarctic waters in 2026. Index exposure is suspected to have occurred during a pre-departure wildlife excursion near Ushuaia (Tierra del Fuego, Argentina). Cases were confirmed and suspected across multiple repatriation destinations as passengers and crew dispersed. The cluster is being tracked by WHO, CDC, PAHO, and Argentina Ministerio de Salud."
              }
            },

              "@type": "Question",
              "name": "What is HORIZON?",

                "@type": "Answer",
                "text": "HORIZON is a live hantavirus surveillance platform operated by 79th Unit Limited, a UK intelligence consultancy (Companies House 17133814). It aggregates outbreak signal from the World Health Organization, US CDC, ECDC, PAHO, ProMED, national health authorities, peer-reviewed literature, and open news. Every record carries audit-grade source provenance including ICD 206 Source Reference Citation, NATO Admiralty Scale reliability, dual-confidence model, and Berkeley Protocol chain-of-custody hash. All data is open under Creative Commons Attribution 4.0."
              }
            },
            {
              "@type": "Question",
              "name": "How can I prevent hantavirus infection?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Reduce rodent populations around homes by sealing entry points, removing food sources, and trapping. When cleaning rodent-infested areas, wear an N95 respirator and gloves, and wet contaminated surfaces with bleach solution before cleaning to suppress aerosols. Avoid sweeping or vacuuming dry rodent excreta. Campers and hikers in endemic areas should avoid sleeping near rodent nests and avoid disturbing rodent burrows."
