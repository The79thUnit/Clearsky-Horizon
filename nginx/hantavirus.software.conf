    # Embeddable widgets — iframe-friendly, no DENY on X-Frame-Options.
    # The widget endpoints themselves set ALLOWALL via the API response.
    location ^~ /widgets {
        proxy_pass http://horizon_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        # NOTE: deliberately omitting X-Frame-Options here so the widget
        # endpoints' ALLOWALL setting is the final header value. Widget
        # pages are noindex via meta tag + X-Robots-Tag.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # Per-source landing pages live under the same /sources/ prefix as the
    # existing /sources hub. Use a regex location to match /sources/{code}
    # but NOT /sources itself (which is the hub, handled above).
    location ~ "^/sources/[a-zA-Z0-9_-]+$" {
        proxy_pass http://horizon_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # Single-page app: try file, then fallback to index.html.
    # index.html must NEVER be cached — it references hashed bundle filenames
    # that change on every redeploy. Caching it strands visitors on stale code.
    # Security headers re-emitted because nginx drops inherited add_header at
    # any leaf that adds its own.
    location / {
        # Crawler routing: bots get the pre-rendered /seo-snapshot HTML
        # with live data baked in; real users get the React SPA below.
        if ($is_crawler) {
            rewrite ^/$ /seo-snapshot last;
        }
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Origin-Agent-Cluster "?1" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://news.google.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://news.google.com; connect-src 'self' https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://news.google.com; worker-src 'self' blob:; manifest-src 'self'; frame-src https://news.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
        expires 0;
        try_files $uri $uri/ /index.html;
    }

    # Hide nginx version
    server_tokens off;
