# HORIZON nginx config for hantavirus.software.
# Mounted into the web container at /etc/nginx/conf.d/default.conf.

# Rate limit zones
# api_rl  — general API (60 req/min per IP, burst 20)
# sse_rl  — SSE stream connections (10 new connections/min per IP, burst 2)
#            SSE connections are long-lived; limiting new connections prevents
#            connection-exhaustion attacks even though the underlying HTTP GET
#            is cheap to initiate.
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=sse_rl:5m  rate=10r/m;

# SEO crawler detection — used inside the SPA location {} to route bots
# to /seo-snapshot (server-rendered HTML with live stats baked in) while
# real users get the React SPA. Pattern covers Google/Bing/DuckDuckGo
# /Baidu/Yandex search bots, the major social-preview scrapers
# (Facebook/Twitter/LinkedIn/Pinterest/Discord/Telegram/WhatsApp/Slack),
# and the AI search crawlers we explicitly welcome in robots.txt.
map $http_user_agent $is_crawler {
    default 0;
    ~*(googlebot|bingbot|slurp|duckduckbot|baiduspider|yandexbot|sogou|applebot|facebookexternalhit|twitterbot|linkedinbot|pinterest|discordbot|telegrambot|whatsapp|slackbot|gptbot|chatgpt-user|oai-searchbot|claudebot|claude-web|anthropic-ai|perplexitybot|perplexity-user|ccbot|google-extended|amazonbot|bytespider|mj12bot|ahrefsbot|semrushbot|naverbot|yeti|seznambot|meta-externalagent) 1;
}

# Upstream pool for the FastAPI backend. Static upstream resolves
# `api` once at nginx startup (or reload) and caches the IP for the
# lifetime of the worker process. `keepalive 32` keeps a pool of warm
# TCP connections so requests don't redo TCP+DNS on every hit, which
# eliminates the Docker-DNS NXDOMAIN race that caused the 502 flickers.
# `max_fails=0` disables nginx's "dead upstream" ejection — the API has
# its own healthcheck and we never want this upstream marked unavailable
# just because one request happened to land mid-restart.
upstream horizon_api {
    server api:8000 max_fails=0;
    keepalive 32;
}


# HTTP -> HTTPS redirect + Let's Encrypt ACME challenge.
# Serves ACME challenges for ALL hostnames (apex, www, and the 79thunit alias)
# so certbot can issue + renew a single multi-SAN cert covering all of them.
server {
    listen 80;
    listen [::]:80;
    server_name hantavirus.software www.hantavirus.software horizon.79thunit.co.uk;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://hantavirus.software$request_uri;
    }
}

# www -> apex redirect (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.hantavirus.software;

    ssl_certificate     /etc/letsencrypt/live/hantavirus.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hantavirus.software/privkey.pem;

    return 301 https://hantavirus.software$request_uri;
}

# horizon.79thunit.co.uk -> hantavirus.software (301, preserves SEO juice on the
# canonical). Same cert (multi-SAN issued by issue_cert.sh).
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name horizon.79thunit.co.uk;

    ssl_certificate     /etc/letsencrypt/live/hantavirus.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hantavirus.software/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    return 301 https://hantavirus.software$request_uri;
}

# Main site (apex)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hantavirus.software;

    ssl_certificate     /etc/letsencrypt/live/hantavirus.software/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hantavirus.software/privkey.pem;

    # Connection hardening: slowloris + oversized-body defence.
    # client_body/header_timeout: abort slow senders (10s is generous for a
    # read-only API where POST bodies don't exist; keeps the value safe for
    # any future write endpoint).
    # client_max_body_size: the API is read-only, no upload endpoints. 4k
    # covers query strings + headers only. Raises 413 for anything larger.
    # keepalive_timeout: standard; don't keep idle sockets alive forever.
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    client_max_body_size 4k;
    send_timeout 30s;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    # Resolver: Docker's embedded DNS (127.0.0.11) first so upstream `api`
    # hostnames resolve, then public resolvers as fallback for OCSP stapling
    # of Let's Encrypt OCSP URLs.
    # valid=5s — short TTL so container rebuilds don't cause 502 windows.
    #            (Previously 300s, which gave a 5-min stale-DNS window every
    #             time we rebuilt any container in the docker network.)
    # valid=1s — minimal DNS cache so transient Docker NXDOMAIN replies
    # expire within one second instead of holding stale-negative for 5.
    resolver 127.0.0.11 1.1.1.1 8.8.8.8 valid=30s ipv6=off;
    resolver_timeout 2s;

    # Security headers (god-mode: targeting Mozilla Observatory A+ and securityheaders.com A+)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # COEP relaxed to credentialless so we can still load Carto map tiles + Google Fonts
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Origin-Agent-Cluster "?1" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-DNS-Prefetch-Control "off" always;
    # Permissions-Policy: deny every browser API we don't use (privacy + attack surface)
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;
    # CSP: strict default-src, only the origins we actually need, no eval, no inline JS.
    # 'unsafe-inline' on style-src is required by MapLibre GL + Google Fonts CSS imports.
    # `https://news.google.com` allowed on script-src + connect-src for Google
    # News Subscribe-with-Google basic loader (Publisher Center: openaccess).
    # If we move to nonces later, drop 'unsafe-inline' from style-src.
    add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://news.google.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://news.google.com; connect-src 'self' https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://news.google.com; worker-src 'self' blob:; manifest-src 'self'; frame-src https://news.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # Gzip — universal compatibility fallback.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/html
        application/json
        application/javascript
        application/ld+json
        application/xml+rss
        application/xml
        application/atom+xml
        application/feed+json
        application/manifest+json
        image/svg+xml;

    # Brotli — disabled pending ABI-matched ngx_brotli module in Alpine's
    # nginx repo. Gzip above handles the vast majority of bandwidth wins.
    # When Alpine ships an ABI-matched build, swap `nginx:1.27-alpine` for
    # one with the module and uncomment the directives below.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_static on;
    # brotli_types text/plain text/css text/xml text/html application/json
    #              application/javascript application/ld+json application/xml
    #              application/atom+xml application/feed+json
    #              application/manifest+json image/svg+xml;

    # Static assets root (the built React bundle)
    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # Long-lived caching for self-hosted Google Fonts mirror.
    # Filenames carry the gstatic hash, so contents are immutable.
    location ^~ /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }


    # robots, manifest, favicons: short cache for static SPA assets.
    # NOTE: /sitemap.xml + /sitemap-*.xml + /news-sitemap.xml are served
    # dynamically by the API (see the SEO surface block lower down) so
    # they're intentionally omitted from this static-cache list.
    location = /robots.txt    { expires 1h; }
    location = /manifest.json { expires 1d; }
    location = /favicon.svg   { expires 7d; }
    location = /favicon.ico   { expires 7d; }
    location = /favicon-32.png    { expires 30d; access_log off; }
    location = /favicon-192.png   { expires 30d; access_log off; }
    location = /favicon-512.png   { expires 30d; access_log off; }
    location = /apple-touch-icon.png { expires 30d; access_log off; }
    location = /og-image.png  { expires 7d;  access_log off; }

    # security.txt (RFC 9116) — always plaintext, short cache
    location = /.well-known/security.txt {
        default_type "text/plain; charset=utf-8";
        expires 1h;
    }
    # Machine-readable privacy disclosure for data catalogues and bots
    location = /.well-known/privacy-disclosure.json {
        default_type "application/json; charset=utf-8";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
        expires 1d;
    }
    # HealthDCAT-AP catalogue record (EU Health Data Space)
    location = /.well-known/healthdcat.jsonld {
        default_type "application/ld+json; charset=utf-8";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=86400" always;
        expires 1d;
    }
    # Citation File Format (CFF) — served as plain text for citation managers
    location = /CITATION.cff {
        default_type "text/plain; charset=utf-8";
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=3600" always;
        expires 1h;
    }
    # IndexNow key file for Bing / Yandex instant indexing.
    # The regex is quoted because nginx parses bare `{N}` as a config block.
    location ~ "^/[a-f0-9]{32}\.txt$" {
        default_type "text/plain; charset=utf-8";
        expires 1d;
    }
    # Disallow access to dotfiles in the SPA root (defensive)
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
        return 404;
    }

    # index.html must NEVER be cached: it's the entry point that references
    # the hashed asset bundles. Caching it would strand visitors on a stale
    # bundle after a redeploy. We re-emit the server-level security headers
    # here because nginx drops inherited add_header directives at any leaf
    # that adds its own.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Origin-Agent-Cluster "?1" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;
        add_header X-DNS-Prefetch-Control "off" always;
        add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), geolocation=(), gyroscope=(), keyboard-map=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(), usb=(), web-share=(), xr-spatial-tracking=()" always;
        add_header Content-Security-Policy "default-src 'none'; script-src 'self' https://news.google.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://news.google.com; connect-src 'self' https://*.basemaps.cartocdn.com https://*.openstreetmap.org https://news.google.com; worker-src 'self' blob:; manifest-src 'self'; frame-src https://news.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
        expires 0;
    }

    # Server-Sent Events stream: NO buffering, long timeout, rate-limited.
    # sse_rl limits new SSE connections (10/min, burst 2) per IP to prevent
    # connection-exhaustion. Once connected, the long-running stream is unaffected.
    location /api/v1/stream/ {
        limit_req zone=sse_rl burst=2 nodelay;
        limit_req_status 429;

        proxy_pass http://horizon_api;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # Public API: rate-limited proxy to FastAPI.
    # proxy_next_upstream doesn't catch DNS-resolution failures (those
    # happen pre-connect). To handle the Docker NXDOMAIN race, we use
    # error_page → @api_retry which sleeps briefly and re-resolves.
    # CRITICAL FIX: Increased timeouts from 5/30/30s to 30/120/120s to support
    # long-running ensemble simulations (20 runs × 5-10s per run = 100s+).
    location /api/ {
        limit_req zone=api_rl burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://horizon_api;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
    }

    # Internal retry: after the resolver's 1s negative-cache expires, the
    # second lookup succeeds. We give it 1.5s of sleep, then retry once.
    # If still failing, return JSON 502 the FE knows how to handle.
    # CRITICAL FIX: Increased retry timeouts to match /api/ (120s read_timeout)
    location @api_retry {
        # echo_sleep + echo not available in vanilla nginx; instead we
        # subrequest a tiny "wait" location then re-proxy. Implemented
        # via a delayed proxy_pass to ourselves using a small wait.
        # Pragmatic: re-resolve immediately with extra retries — by now
        # ~5-10ms has passed (request latency) and another nginx round
        # may already see the cache expire if we use a tiny valid TTL.
        proxy_pass http://horizon_api;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        # If even this fails, return a structured JSON the FE retry catches.
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_fail_json;
    }

    location @api_fail_json {
        default_type application/json;
        return 503 '{"error":"upstream_resolving","retry_after_ms":1500}';
        add_header Retry-After "1" always;
        add_header Cache-Control "no-store" always;
    }

    # Health + OpenAPI via the same lazy-resolved upstream.
    # Must explicitly forward Host: $host so the FastAPI TrustedHostMiddleware
    # receives the canonical domain name, not nginx's default $proxy_host.
    location = /health {
        proxy_pass http://horizon_api/health;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
    }
    location ^~ /openapi.json {
        proxy_pass http://horizon_api/api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
    }

    # ------------------------------------------------------------------
    # SEO surface (sitemaps, feeds, server-rendered HTML topic clusters).
    # All routed to the FastAPI backend's `seo` router. These paths MUST
    # take precedence over the SPA `try_files` catch-all below so crawlers
    # receive fully-populated HTML/XML instead of the React shell. The
    # API sets its own Cache-Control + ETag; nginx transparently proxies.
    # ------------------------------------------------------------------

    # Sitemaps + feeds
    location = /sitemap.xml {
        proxy_pass http://horizon_api/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
    }
    location ~ "^/sitemap-[a-z]+\.xml$" {
        proxy_pass http://horizon_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
    }
    location = /news-sitemap.xml {
        proxy_pass http://horizon_api/news-sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
    }
    location = /rss.xml {
        proxy_pass http://horizon_api/rss.xml;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
    }
    location = /atom.xml {
        proxy_pass http://horizon_api/atom.xml;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
    }
    location = /feed.json {
        proxy_pass http://horizon_api/feed.json;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
    }

    # Server-rendered HTML topic clusters. `^~` prefix takes precedence
    # over regex and over the `/` try_files block.
    location ^~ /hantavirus {
        proxy_pass http://horizon_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }
    location ^~ /outbreaks {
        proxy_pass http://horizon_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }
    location ^~ /countries {
        proxy_pass http://horizon_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }
    location ^~ /articles {
        proxy_pass http://horizon_api$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }
    location = /sources {
        proxy_pass http://horizon_api/sources;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }
    location = /methodology {
        proxy_pass http://horizon_api/methodology;
        proxy_http_version 1.1;
        proxy_set_header Connection \"\";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_retry;
        add_header X-Content-Type-Options "nosniff" always;
