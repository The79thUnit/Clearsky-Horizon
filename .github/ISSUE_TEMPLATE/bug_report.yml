name: Bug Report
description: Report a connector failure, API error, or platform issue
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API (FastAPI / endpoints)
        - Worker (Celery / connector)
        - Frontend (React / UI)
        - Database / migrations
        - nginx / proxy
        - Docker / deployment
        - Other
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: Affected source (if connector bug)
      description: Source code from the /api/v1/sources endpoint, e.g. "who-don", "cdc-han"
      placeholder: e.g. reuters-health

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run connector X
        2. Observe Y
        3. Expected Z

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
